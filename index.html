<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lee's Manga Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="scripts.js" type="module"></script>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="page container py-5">
      <header class="mb-4">
        <p class="eyebrow">Welcome to</p>
        <h1 class="display-4">Lee's Manga Tracker</h1>
      </header>
      <section>
        <div class="file-options">
          <input type="file" class="form-control" id="fileInput" accept=".json"/>
        </div>
        <div class="options">
          <button id="addButton" class="btn btn-primary me-2" data-bs-toggle="modal" data-bs-target="#addSeriesModal">Add Series</button>
          <div class="modal fade" id="addSeriesModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false" aria-labelledby="addSeriesModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title">Add Series</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="addSeriesCloseButton"></button>
                </div>
                <div class="modal-body">
                  <input type="text" id="seriesTitle" class="form-control mb-2" placeholder="Series Title" />
                  <input type="number" min="0" id="seriesChapter" class="form-control mb-2" placeholder="Current Chapter" />               
                  <select class="form-select mb-2" id="seriesStatus">
                    <option value="" disabled selected>Select Status</option>
                    <option value="Reading">Reading</option>
                    <option value="On Hold">On Hold</option>
                    <option value="Dropped">Dropped</option>
                    <option value="Completed">Completed</option>
                  </select>
                  <select class="form-select mb-2" id="seriesType">
                    <option value="" disabled selected>Select Type</option>
                    <option value="Manga">Manga</option>
                    <option value="Manhua">Manhua</option>
                    <option value="Manhwa">Manhwa</option>
                  </select>
                  <div id="addSeriesAlertPlaceholder" class="mb-2"></div>
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="addSeriesCancelButton">Cancel</button>
                  <button type="button" class="btn btn-primary" id="addSeriesSubmitButton">Submit</button>
                </div>
              </div>
            </div>
          </div>

          <input type="button" id="removeButton" value="Remove Series" class="btn btn-danger"/>
          
        </div>
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
              <tr>
                <th scope="col">Title</th>
                <th scope="col">Chapter</th>
                <th scope="col">Status</th>
              </tr>
            </thead>
            <tbody id="seriesTableBody">
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
    </script>
  </body>
</html>
